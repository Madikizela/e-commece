name: Automated Testing Suite

on:
  push:
    branches: [ main, development, staging ]
  pull_request:
    branches: [ main, development, staging ]
  schedule:
    # Run automated tests daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Type of tests to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - unit
          - integration
          - e2e
          - performance
      environment:
        description: 'Target environment'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - staging
          - production

jobs:
  automated-testing:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        test-suite: [backend-unit, backend-integration, frontend-unit, frontend-e2e, performance]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ./frontend-app/package-lock.json
    
    - name: Install Frontend Dependencies
      run: npm ci --no-audit --no-fund
      working-directory: ./frontend-app
    
    - name: Build Backend
      run: |
        dotnet restore EcommerceAPI.csproj
        dotnet build EcommerceAPI.csproj --configuration Release --no-restore
      working-directory: ./backend
    
    - name: Build Integration Tests
      if: matrix.test-suite == 'backend-integration'
      run: |
        dotnet restore Tests/EcommerceAPI.IntegrationTests.csproj
        dotnet build Tests/EcommerceAPI.IntegrationTests.csproj --configuration Release --no-restore
      working-directory: ./backend
    
    - name: Start Backend Server
      if: matrix.test-suite == 'backend-integration' || matrix.test-suite == 'frontend-e2e' || matrix.test-suite == 'performance'
      run: |
        dotnet run --project backend/EcommerceAPI.csproj --configuration Release &
        sleep 10
        echo "Backend server started"
    
    - name: Run Backend Unit Tests
      if: matrix.test-suite == 'backend-unit'
      run: |
        echo "🧪 Running Backend Unit Tests"
        # Note: Add actual unit tests when available
        echo "✅ Backend unit tests completed (placeholder)"
    
    - name: Run Backend Integration Tests
      if: matrix.test-suite == 'backend-integration'
      run: |
        echo "🧪 Running Backend Integration Tests"
        dotnet test backend/Tests/EcommerceAPI.IntegrationTests.csproj --configuration Release --logger "trx;LogFileName=integration-results.trx" --no-build
    
    - name: Run Frontend Unit Tests
      if: matrix.test-suite == 'frontend-unit'
      run: |
        echo "🧪 Running Frontend Unit Tests"
        npm run test:run
      working-directory: ./frontend-app
      env:
        CI: true
    
    - name: Run Frontend E2E Tests
      if: matrix.test-suite == 'frontend-e2e'
      run: |
        echo "🧪 Running Frontend E2E Tests"
        npm run test:run -- src/test/e2e/
      working-directory: ./frontend-app
      env:
        CI: true
        VITE_API_URL: http://localhost:5000
    
    - name: Run Performance Tests
      if: matrix.test-suite == 'performance'
      run: |
        echo "🧪 Running Performance Tests"
        # Basic performance testing
        for endpoint in "/api/health" "/api/health/ready" "/api/products" "/api/categories"; do
          echo "Testing endpoint: $endpoint"
          start_time=$(date +%s%N)
          response=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:5000$endpoint" || echo "000")
          end_time=$(date +%s%N)
          duration=$(( (end_time - start_time) / 1000000 ))
          
          if [ "$response" = "200" ] && [ "$duration" -lt 1000 ]; then
            echo "✅ $endpoint: ${duration}ms (HTTP $response)"
          else
            echo "❌ $endpoint: ${duration}ms (HTTP $response)"
            exit 1
          fi
        done
    
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.test-suite }}
        path: |
          backend/TestResults/
          frontend-app/coverage/
          **/*.trx
          **/*.xml
        retention-days: 30
    
    - name: Test Summary
      if: always()
      run: |
        echo "## 🧪 Test Suite: ${{ matrix.test-suite }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Environment**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Timestamp**: $(date)" >> $GITHUB_STEP_SUMMARY

  test-summary:
    needs: automated-testing
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Download All Test Results
      uses: actions/download-artifact@v4
      with:
        path: test-results
    
    - name: Generate Test Summary
      run: |
        echo "# 🤖 Automated Testing Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Test Results by Suite" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Check each test suite result
        for suite in backend-unit backend-integration frontend-unit frontend-e2e performance; do
          if [ -d "test-results/test-results-$suite" ]; then
            echo "- ✅ **$suite**: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ **$suite**: FAILED" >> $GITHUB_STEP_SUMMARY
          fi
        done
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Environment Information" >> $GITHUB_STEP_SUMMARY
        echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Triggered by**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Timestamp**: $(date)" >> $GITHUB_STEP_SUMMARY

  notify-results:
    needs: [automated-testing, test-summary]
    runs-on: ubuntu-latest
    if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
    
    steps:
    - name: Notify Success
      if: needs.automated-testing.result == 'success'
      run: |
        echo "🎉 All automated tests passed!"
        echo "Environment: ${{ github.ref_name }}"
        echo "Ready for deployment"
    
    - name: Notify Failure
      if: needs.automated-testing.result == 'failure'
      run: |
        echo "❌ Automated tests failed!"
        echo "Environment: ${{ github.ref_name }}"
        echo "Deployment blocked until tests pass"
        exit 1