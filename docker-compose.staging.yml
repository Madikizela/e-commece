# Docker Compose Staging Configuration for CD Testing Rules
# Implements staging-specific automation rules and quality gates

version: '3.8'

services:
  backend:
    environment:
      # CD Rule: Staging environment thresholds (production-like)
      - ASPNETCORE_ENVIRONMENT=Staging
      - CD_MAX_RESPONSE_TIME_MS=500
      - CD_MAX_ERROR_RATE_PERCENT=1
      - CD_MIN_AVAILABILITY_PERCENT=99.5
      - CD_HEALTH_CHECK_INTERVAL=30
      - CD_ROLLBACK_THRESHOLD_FAILURES=3
      - CD_ENVIRONMENT=staging
      - CD_QUALITY_GATE_STRICT=true
      - CD_SECURITY_SCAN_ENABLED=true
    # CD Rule: Staging resource limits (production-like)
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 300s
    # CD Rule: Staging health checks (more frequent)
    healthcheck:
      test: |
        curl -f http://localhost:8080/api/health || exit 1
        curl -f http://localhost:8080/api/health/ready || exit 1
        curl -f http://localhost:8080/api/health/live || exit 1
        curl -f http://localhost:8080/api/health/detailed || exit 1
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    labels:
      - "cd.environment=staging"
      - "cd.quality.gate.strict=true"
      - "cd.rollback.auto=true"
      - "cd.security.scan=required"
      - "cd.performance.sla=strict"

  frontend:
    environment:
      - NODE_ENV=staging
      - CD_PERFORMANCE_MONITORING=true
      - CD_ERROR_TRACKING=true
      - CD_ENVIRONMENT=staging
    # CD Rule: Staging frontend health checks
    healthcheck:
      test: |
        wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 1
        wget --no-verbose --tries=1 --spider http://localhost:3000/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 3
    labels:
      - "cd.environment=staging"
      - "cd.quality.gate.strict=true"
      - "cd.performance.monitoring=enabled"

  # CD Rule: Staging-specific monitoring (full stack)
  monitoring:
    environment:
      - PROMETHEUS_RETENTION_TIME=7d
      - PROMETHEUS_SCRAPE_INTERVAL=15s
    volumes:
      - ./monitoring/staging-prometheus.yml:/etc/prometheus/prometheus.yml:ro
    labels:
      - "cd.environment=staging"
      - "cd.monitoring.level=full"

  # CD Rule: Staging quality gate service (required)
  quality-gate:
    environment:
      - SONAR_QUALITY_GATE_WAIT=true
      - SONAR_QUALITY_GATE_TIMEOUT=300
    labels:
      - "cd.environment=staging"
      - "cd.quality.gate=required"
      - "cd.deployment.blocker=true"

  # CD Rule: Staging security scanner (mandatory)
  security-scanner:
    profiles: [] # Always run in staging
    environment:
      - ZAP_BASELINE_TIMEOUT=300
      - ZAP_FAIL_ON_WARN=true
    labels:
      - "cd.environment=staging"
      - "cd.security.scan=mandatory"
      - "cd.deployment.blocker=true"

  # CD Rule: Staging performance tester (mandatory)
  performance-tester:
    profiles: [] # Always run in staging
    environment:
      - K6_VUS=50
      - K6_DURATION=5m
      - K6_FAIL_ON_THRESHOLD=true
    labels:
      - "cd.environment=staging"
      - "cd.performance.test=mandatory"
      - "cd.deployment.blocker=true"

  # CD Rule: Staging integration test runner
  integration-tester:
    image: postman/newman:latest
    container_name: cd-integration-tester
    volumes:
      - ./integration-tests:/etc/newman:ro
      - ./test-reports:/reports:rw
    command: run /etc/newman/staging-collection.json --environment /etc/newman/staging-environment.json --reporters cli,json --reporter-json-export /reports/integration-results.json
    depends_on:
      backend:
        condition: service_healthy
    labels:
      - "cd.component=integration-test"
      - "cd.environment=staging"
      - "cd.test.type=integration"
      - "cd.deployment.blocker=true"

# CD Rule: Staging network configuration (more secure)
networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
    labels:
      - "cd.network=staging"
      - "cd.security.level=high"