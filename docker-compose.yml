version: '3.8'

# CD Testing Rules Integration
# This docker-compose.yml implements automation rules for:
# - Health monitoring and checks
# - Performance thresholds
# - Quality gates validation
# - Rollback procedures
# - Security configurations

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ecommerce_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # CD Rule: Database monitoring and rollback criteria
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    labels:
      - "cd.component=database"
      - "cd.health.critical=true"
      - "cd.rollback.trigger=health_check_failure"
      - "cd.monitoring.enabled=true"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=ecommerce_dev;Username=postgres;Password=password
      - JWT__SecretKey=your-super-secret-jwt-key-here-make-it-long-and-secure
      - JWT__Issuer=EcommerceAPI
      - JWT__Audience=EcommerceAPI
      - EMAIL__HOST=smtp.gmail.com
      - EMAIL__PORT=587
      - EMAIL__USERNAME=your-email@gmail.com
      - EMAIL__PASSWORD=your-app-password
      - EMAIL__FROM=your-email@gmail.com
      # CD Testing Rules Environment Variables
      - CD_MAX_RESPONSE_TIME_MS=500
      - CD_MAX_ERROR_RATE_PERCENT=1
      - CD_MIN_AVAILABILITY_PERCENT=99.9
      - CD_MAX_CPU_USAGE_PERCENT=70
      - CD_MAX_MEMORY_USAGE_PERCENT=80
      - CD_HEALTH_CHECK_INTERVAL=30
      - CD_ROLLBACK_THRESHOLD_FAILURES=3
      # CI Rules Environment Variables
      - CI_BUILD_VALIDATION=true
      - CI_CODE_QUALITY_CHECK=true
      - CI_SECURITY_SCAN_ENABLED=true
      - CI_COVERAGE_REQUIRED=70
      - CI_LINT_ENABLED=true
      - CI_FORMAT_CHECK=true
      - CI_DEPENDENCY_SCAN=true
    ports:
      - "5222:8080"
    depends_on:
      postgres:
        condition: service_healthy
    # CD Rule: Comprehensive health checks with performance thresholds
    healthcheck:
      test: |
        curl -f http://localhost:8080/api/health || exit 1
        curl -f http://localhost:8080/api/health/ready || exit 1
        curl -f http://localhost:8080/api/health/live || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # CD Rule: Resource limits and rollback policies
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 300s
    volumes:
      - ./backend:/app/src
    restart: unless-stopped
    # CD Rule: Service labels for monitoring and automation
    labels:
      - "cd.component=backend"
      - "cd.health.critical=true"
      - "cd.performance.response_time_max=500ms"
      - "cd.performance.error_rate_max=1%"
      - "cd.performance.cpu_max=70%"
      - "cd.performance.memory_max=80%"
      - "cd.rollback.trigger=health_check_failure,performance_degradation"
      - "cd.monitoring.enabled=true"
      - "cd.security.scan=true"
      - "cd.quality.gate=true"
      # CI Rules Labels
      - "ci.build.required=true"
      - "ci.test.unit=required"
      - "ci.test.integration=required"
      - "ci.lint.dotnet=true"
      - "ci.format.check=true"
      - "ci.security.scan=required"
      - "ci.coverage.threshold=70%"

  frontend:
    build:
      context: ./frontend-app
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:5222
      # CD Testing Rules Environment Variables
      - CD_HEALTH_CHECK_ENABLED=true
      - CD_PERFORMANCE_MONITORING=true
      - CD_ERROR_TRACKING=true
      # CI Rules Environment Variables
      - CI_BUILD_VALIDATION=true
      - CI_LINT_ENABLED=true
      - CI_TYPECHECK_ENABLED=true
      - CI_TEST_UNIT=true
      - CI_TEST_E2E=true
      - CI_COVERAGE_ENABLED=true
      - CI_COVERAGE_THRESHOLD=70
      - CI_FORMAT_CHECK=true
      - CI_BUNDLE_ANALYSIS=true
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    # CD Rule: Frontend health and performance monitoring
    healthcheck:
      test: |
        wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 1
        wget --no-verbose --tries=1 --spider http://localhost:3000/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    # CD Rule: Frontend resource management
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 180s
    restart: unless-stopped
    labels:
      - "cd.component=frontend"
      - "cd.health.critical=true"
      - "cd.performance.load_time_max=3s"
      - "cd.rollback.trigger=health_check_failure"
      - "cd.monitoring.enabled=true"
      - "cd.quality.gate=true"
      # CI Rules Labels
      - "ci.build.required=true"
      - "ci.test.unit=required"
      - "ci.test.e2e=required"
      - "ci.lint.eslint=true"
      - "ci.lint.typescript=true"
      - "ci.format.prettier=true"
      - "ci.coverage.threshold=70%"
      - "ci.bundle.analysis=true"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    # CD Rule: Redis health monitoring
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    # CD Rule: Redis resource limits and restart policy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    restart: unless-stopped
    labels:
      - "cd.component=cache"
      - "cd.health.critical=false"
      - "cd.rollback.trigger=health_check_failure"
      - "cd.monitoring.enabled=true"

  # CD Rule: Monitoring and observability stack
  monitoring:
    image: prom/prometheus:latest
    container_name: cd-monitoring
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    labels:
      - "cd.component=monitoring"
      - "cd.health.critical=false"
      - "cd.monitoring.self=true"

  # CD Rule: Quality gates and testing service
  quality-gate:
    image: sonarqube:community
    container_name: cd-quality-gate
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
      - SONAR_JDBC_URL=jdbc:postgresql://postgres:5432/sonarqube
      - SONAR_JDBC_USERNAME=postgres
      - SONAR_JDBC_PASSWORD=password
      # CI Rule: Quality gate thresholds
      - SONAR_QUALITY_GATE_WAIT=true
      - SONAR_COVERAGE_THRESHOLD=70
      - SONAR_DUPLICATED_LINES_THRESHOLD=3
      - SONAR_MAINTAINABILITY_RATING=A
      - SONAR_RELIABILITY_RATING=A
      - SONAR_SECURITY_RATING=A
    ports:
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9000/api/system/status"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    labels:
      - "cd.component=quality-gate"
      - "cd.health.critical=false"
      - "cd.quality.scanner=true"
      - "ci.code.analysis=true"
      - "ci.coverage.required=70%"
      - "ci.quality.gate=blocking"

  # CI Rule: Continuous Integration build service
  ci-builder:
    build:
      context: .
      dockerfile: Dockerfile.ci
    container_name: ci-builder
    environment:
      # CI Rule: Build configuration
      - CI=true
      - NODE_ENV=test
      - ASPNETCORE_ENVIRONMENT=Testing
      - CI_BUILD_TIMEOUT=600
      - CI_TEST_TIMEOUT=300
      - CI_COVERAGE_THRESHOLD=70
      - CI_LINT_FAIL_ON_ERROR=true
      - CI_SECURITY_SCAN=true
    volumes:
      - .:/workspace:ro
      - ci_build_cache:/workspace/.cache
      - ci_test_results:/workspace/test-results
      - ci_coverage_reports:/workspace/coverage
    command: |
      sh -c "
        echo '🔨 CI Build Process Started'
        
        # CI Rule: Code quality checks
        echo '🔍 Running linting and code quality...'
        cd /workspace/frontend-app && npm run lint
        cd /workspace/backend && dotnet format --verify-no-changes
        
        # CI Rule: Dependency security scan
        echo '🔒 Scanning dependencies for vulnerabilities...'
        cd /workspace/frontend-app && npm audit --audit-level=high
        
        # CI Rule: Build verification
        echo '🏗️ Building applications...'
        cd /workspace/backend && dotnet build --configuration Release --no-restore
        cd /workspace/frontend-app && npm run build
        
        # CI Rule: Test execution
        echo '🧪 Running tests...'
        cd /workspace/frontend-app && npm run test:run
        
        # CI Rule: Coverage validation
        echo '📊 Validating code coverage...'
        cd /workspace/frontend-app && npm run coverage
        
        echo '✅ CI Build Process Completed'
      "
    profiles:
      - ci-build
    labels:
      - "ci.component=builder"
      - "ci.build.automated=true"
      - "ci.test.runner=true"
      - "ci.quality.enforcer=true"

  # CI Rule: Test runner service
  test-runner:
    image: node:20-alpine
    container_name: ci-test-runner
    working_dir: /app
    environment:
      # CI Rule: Test configuration
      - CI=true
      - NODE_ENV=test
      - CI_TEST_PARALLEL=true
      - CI_TEST_TIMEOUT=30000
      - CI_COVERAGE_ENABLED=true
      - CI_WATCH_MODE=false
    volumes:
      - ./frontend-app:/app:ro
      - ci_test_results:/app/test-results
      - ci_coverage_reports:/app/coverage
    command: |
      sh -c "
        echo '🧪 CI Test Runner Started'
        npm ci --no-audit --no-fund
        
        # CI Rule: Unit tests
        echo '🔬 Running unit tests...'
        npm run test:run -- --reporter=junit --outputFile=test-results/unit-tests.xml
        
        # CI Rule: Integration tests
        echo '🔗 Running integration tests...'
        npm run test:integration || echo 'Integration tests not configured'
        
        # CI Rule: E2E tests (if backend is available)
        echo '🎭 Running E2E tests...'
        npm run test:e2e || echo 'E2E tests require backend'
        
        # CI Rule: Coverage report
        echo '📊 Generating coverage report...'
        npm run coverage -- --reporter=lcov --outputFile=coverage/lcov.info
        
        echo '✅ CI Test Runner Completed'
      "
    profiles:
      - ci-test
    labels:
      - "ci.component=test-runner"
      - "ci.test.unit=true"
      - "ci.test.integration=true"
      - "ci.test.e2e=true"
      - "ci.coverage.generator=true"

  # CI Rule: Code linting service
  linter:
    image: node:20-alpine
    container_name: ci-linter
    working_dir: /app
    environment:
      # CI Rule: Linting configuration
      - CI=true
      - CI_LINT_FAIL_ON_ERROR=true
      - CI_LINT_FAIL_ON_WARNING=false
      - CI_LINT_FORMAT=junit
    volumes:
      - ./frontend-app:/app:ro
      - ci_lint_results:/app/lint-results
    command: |
      sh -c "
        echo '🔍 CI Linter Started'
        npm ci --no-audit --no-fund
        
        # CI Rule: ESLint validation
        echo '📝 Running ESLint...'
        npm run lint -- --format junit --output-file lint-results/eslint.xml
        
        # CI Rule: TypeScript validation
        echo '🔷 Running TypeScript check...'
        npm run typecheck
        
        # CI Rule: Prettier validation
        echo '💅 Running Prettier check...'
        npm run format:check || echo 'Prettier check failed'
        
        echo '✅ CI Linter Completed'
      "
    profiles:
      - ci-lint
    labels:
      - "ci.component=linter"
      - "ci.lint.eslint=true"
      - "ci.lint.typescript=true"
      - "ci.lint.prettier=true"

  # CD Rule: Security scanning service
  security-scanner:
    image: owasp/zap2docker-stable
    container_name: cd-security-scanner
    command: zap-baseline.py -t http://backend:8080 -J zap-report.json
    volumes:
      - ./security-reports:/zap/wrk:rw
    depends_on:
      backend:
        condition: service_healthy
    profiles:
      - security-scan
    labels:
      - "cd.component=security"
      - "cd.security.scanner=owasp-zap"
      - "cd.automation.trigger=manual"

  # CD Rule: Performance testing service
  performance-tester:
    image: grafana/k6:latest
    container_name: cd-performance-tester
    volumes:
      - ./performance-tests:/scripts:ro
      - ./performance-reports:/reports:rw
    command: run --out json=/reports/performance-results.json /scripts/load-test.js
    environment:
      - TARGET_URL=http://backend:8080
      - MAX_RESPONSE_TIME=500
      - ERROR_RATE_THRESHOLD=1
    depends_on:
      backend:
        condition: service_healthy
    profiles:
      - performance-test
    labels:
      - "cd.component=performance"
      - "cd.performance.tester=k6"
      - "cd.automation.trigger=manual"

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  # CI Rule: CI-specific volumes
  ci_build_cache:
  ci_test_results:
  ci_coverage_reports:
  ci_lint_results:

# CD Rule: Network configuration for service isolation and security
networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
    labels:
      - "cd.network=isolated"
      - "cd.security.enabled=true"